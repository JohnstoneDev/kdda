<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon – KDDA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #060d18;
      --cream: #e0eaf5;
      --cyan: #4dc8e8;
      --blue: #1a6aaa;
      --glow: rgba(77, 200, 232, 0.18);
    }

    body {
      background-color: var(--ink);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.1;
      pointer-events: none;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: var(--cyan);
      top: -200px; right: -200px;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--blue);
      bottom: -120px; left: -120px;
      animation: drift 18s ease-in-out infinite alternate-reverse;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: var(--cyan);
      bottom: 30%; right: 10%;
      opacity: 0.05;
      animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 25px); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.1s;
    }
    .logo-wrap img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 0 24px rgba(77,200,232,0.5)) drop-shadow(0 0 60px rgba(77,200,232,0.2));
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(77,200,232,0.45)) drop-shadow(0 0 55px rgba(77,200,232,0.18)); }
      50%       { filter: drop-shadow(0 0 32px rgba(77,200,232,0.7)) drop-shadow(0 0 80px rgba(77,200,232,0.3)); }
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }
    .rule-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--cyan));
    }
    .rule-line.right {
      background: linear-gradient(90deg, var(--cyan), transparent);
    }
    .rule-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    .label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
      text-shadow: 0 0 12px rgba(77,200,232,0.6);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 11vw, 7.5rem);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin: 1.2rem 0 0.4rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.8s;
    }
    h1 em {
      font-style: italic;
      color: var(--cyan);
      display: block;
      text-shadow: 0 0 40px rgba(77,200,232,0.35);
    }

    .subtext {
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.07em;
      color: rgba(224, 234, 245, 0.5);
      margin: 1.8rem 0 2.6rem;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.05s;
    }

    .form-wrap {
      display: flex;
      align-items: stretch;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid rgba(77, 200, 232, 0.3);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-wrap:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(77,200,232,0.15);
    }
    .form-wrap input {
      flex: 1;
      background: rgba(77,200,232,0.04);
      border: none;
      outline: none;
      padding: 0.9rem 1.2rem;
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }
    .form-wrap input::placeholder { color: rgba(224,234,245,0.28); }
    .form-wrap button {
      background: var(--cyan);
      border: none;
      padding: 0.9rem 1.4rem;
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .form-wrap button:hover {
      background: #7addf0;
      box-shadow: 0 0 20px rgba(77,200,232,0.4);
    }

    .bottom-rule {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.4s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success {
      display: none;
      color: var(--cyan);
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1rem;
      text-shadow: 0 0 12px rgba(77,200,232,0.5);
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">

    <div class="logo-wrap">
      <img id="logoImg" alt="Kakuzi Division Development Association" />
    </div>

    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-dot"></div>
      <div class="rule-line right"></div>
    </div>

    <p class="label">Under Development</p>

    <h1>Coming<em>Soon.</em></h1>

    <p class="subtext">
      We are preparing to launch and will be with you shortly.<br/>
      Submit your email to receive a notification upon our arrival.
    </p>

    <div class="form-wrap">
      <input type="email" id="emailInput" placeholder="your@email.com" />
      <button onclick="handleSubmit()">Notify Me</button>
    </div>
    <p class="success" id="successMsg">✦ &nbsp;You're on the list.</p>

    <div class="bottom-rule">
      <div class="rule">
        <div class="rule-line"></div>
        <div class="rule-dot"></div>
        <div class="rule-line right"></div>
      </div>
    </div>
  </div>

    function handleSubmit() {
      const input = document.getElementById('emailInput');
      const msg = document.getElementById('successMsg');
      if (input.value && input.value.includes('@')) {
        input.parentElement.style.display = 'none';
        msg.style.display = 'block';
      } else {
        input.style.outline = '1px solid #c45c3a';
        setTimeout(() => input.style.outline = '', 800);
      }
    }
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
